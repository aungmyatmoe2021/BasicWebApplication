<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert : Bootstrap - CSS Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="alert alert-primary">
        Primary completed something
    </div>
    <div class="alert alert-secondary">
        Secondary completed something
    </div>
    <div class="alert alert-success">
        Successfully completed something
    </div>
    <div class="alert alert-danger">
        Danger completed something
    </div>
    <div class="alert alert-warning">
        Warning completed something
    </div>
    <div class="alert alert-info">
        Info completed something
    </div>
    <div class="alert alert-light">
        Light completed something
    </div>
    <div class="alert alert-dark">
        Dark completed something
    </div>
</body>
</html>
