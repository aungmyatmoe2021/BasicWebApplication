<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap - CSS Component : Table Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table class="table table-striped table-bordered table-primary">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Alice</td>
            <td>22</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Bob</td>
            <td>23</td>
        </tr>
        <tr>
            <td colspan="2">Total</td>
            <td>45</td>
        </tr>
    </table>
</body>
</html>
