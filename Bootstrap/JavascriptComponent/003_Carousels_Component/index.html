<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousels : Bootstrap - Javascript Component</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="carousel slide" data-bs-ride="carousel" id="slide">
        <ol class="carousel-indicators">
            <li data-bs-target="#slide" data-bs-slide-to="0" class="active"></li>
            <li data-bs-target="#slide" data-bs-slide-to="1"></li>
            <li data-bs-target="#slide" data-bs-slide-to="2"></li>
            <li data-bs-target="#slide" data-bs-slide-to="3"></li>
            <li data-bs-target="#slide" data-bs-slide-to="4"></li>
            <li data-bs-target="#slide" data-bs-slide-to="5"></li>
            <li data-bs-target="#slide" data-bs-slide-to="6"></li>
            <li data-bs-target="#slide" data-bs-slide-to="7"></li>
        </ol>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <div class="bg-primary" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-secondary" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-success" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-danger" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-warning" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-info" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-light" style="height: 200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="bg-dark" style="height: 200px;"></div>
            </div>
        </div>
        <a href="#slide" class="carousel-control-prev" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></a>
        <a href="#slide" class="carousel-control-next" data-bs-slide="next"><span class="carousel-control-next-icon"></span></a>
    </div>
</body>
</html>
