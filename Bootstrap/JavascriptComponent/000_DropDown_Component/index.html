<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropDown : Bootstrap - Javascript Component</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dropdown">
        <button class="btn btn-dark dropdown-toggle" data-bs-toggle="dropdown">Send Now</button>
        <ul class="dropdown-menu dropdown-menu-dark">
            <li><a href="#" class="dropdown-item">Send Now</a></li>
            <li><a href="#" class="dropdown-item">Save Draft</a></li>
            <hr class="dropdown-driver"></hr>
            <li><a href="#" class="dropdown-item">Preview</a></li>
        </ul>
    </div>
</body>
</html>
