<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript : Fundmental Web Development</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
    <div class="card">
        <div class="card-body">
            <div style="text-align: center;">
                <h1>Background Changer</h1>
                <button type="button" class="btn btn-primary">Primary</button>
                <button type="button" class="btn btn-success">Success</button>
                <button type="button" class="btn btn-info">Info</button>
                <button type="button" class="btn btn-warning">Warning</button>
                <button type="button" class="btn btn-danger">Danger</button>
            </div>
        </div>
    </div>
    <script>
        let buttons = document.querySelectorAll(".btn");
        let body = document.querySelector("body");

        buttons.forEach((button)=>{
            button.addEventListener('click',(e)=>{
                e.preventDefault();
                switch (button.classList[1]){
                    case "btn-primary":
                        body.style.backgroundColor = "#007bff";
                        break;
                    case "btn-success":
                        body.style.backgroundColor = "#28a745";
                        break;
                    case "btn-info":
                        body.style.backgroundColor = "#18a2b8";
                        break;
                    case "btn-warning":
                        body.style.backgroundColor = "#ffc108";
                        break;
                    case "btn-danger":
                        body.style.backgroundColor = "#dc3645";
                        break;
                    default:
                        body.style.backgroundColor = "#000000";
                }
            })
        })
    </script>
</body>
</html>
