<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Variable : Javascript 30</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="https://fav.farm/🥰">
    </head>
    <body>
        <h2>Update CSS Variable with <span class="hl">JS</span></h2>

        <div class="controls">
            <label for="spacing">Spacing:</label>
            <input type="range" name="spacing" id="spacing" min="10" max="200" value="10" data-sizing="px">

            
            <label for="blur">Blur:</label>
            <input type="range" name="blur" id="blur" min="0" max="25" value="10" data-sizing="px">

            
            <label for="base">Base Color:</label>
            <input type="color" name="base" id="base" value="#ffc600">

        </div>
        <img src="https://plus.unsplash.com/premium_photo-1780332929942-15a60d5184b4?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" width="800" height="500" alt="">
        <script src="./index.js"></script>
    </body>
</html>
