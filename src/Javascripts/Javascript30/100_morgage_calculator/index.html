<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Morgage Calculator : Javascript 30</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="https://fav.farm/🥰">
    </head>
    <body>
        <h2>Morgage Calculator</h2>

        <div class="controls">
            <label for="housePrice">House Price:</label>
            <div class="inputElement">
                <input type="number" name="housePrice" id="housePrice" class="no-arrows">
            </div>
        </div>
        <div class="controls">
            <label for="downPayment">Down Payment:</label>
            <input type="number" name="downPayment" id="downPayment" class="no-arrows">
        </div>
        <div class="controls">
            <label for="annaulInterestRate">Annual Interest Rate:</label>
            <input type="number" name="annaulInterestRate" id="annaulInterestRate" class="no-arrows">
        </div>
        <div class="controls">
            <label for="planOfYear">Plan of Year:</label>
            <input type="number" name="planOfYear" id="planOfYear" class="no-arrows">
        </div>
        <div class="controls">
            <label for="monthlypayment">Your Monthly Payment:</label>
            <input type="number" name="monthlypayment" id="monthlypayment" readonly class="no-arrows">
        </div>
        <script src="./index.js"></script>
    </body>
</html>
